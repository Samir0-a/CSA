<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet" href="board.css">
</head>
<body>
    <!-- Navigation -->
        <nav class="navbar">
    <div class="logo">
        <img src="csa logo.jpeg">
        <div>
            <h2>CSA</h2>
            <span>Computer Science Association</span>
        </div>
    </div>

    <ul class="nav-links">

        <li><a href="index.html">Home</a></li>

        <li><a href="board.html">CSA Board</a></li>

        <li><a href="events.html">Events</a></li>

        <li><a href="projects.html">Projects</a></li>

        <li><a href="resources.html">Resources</a></li>

        <li><a href="gallery.html">Gallery</a></li>

        <li><a href="contact.html">Contact</a></li>

    </ul>

    <div class="nav-buttons">
        <button class="join-btn">Join CSA</button>
        <button id="theme-toggle">
            <i class="fas fa-moon"></i>
        </button>
    </div>

</nav>


    <!-- Hero Section -->
    <section class="hero">
        <h1>Contact Us</h1>
        <div class="breadcrumb">
            <a href="#home">Home</a> / Contact
        </div>
    </section>

    <!-- Main Content -->
    <div class="container">
        <div class="content-wrapper">
            <!-- Form Section -->
            <div class="form-section">
                <h2>Send Us a Message</h2>
                <form>
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="">
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="">
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="">
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" placeholder=""></textarea>
                    </div>
                    <button type="submit" class="btn-send">Send Message</button>
                </form>
            </div>

            <!-- Info Section -->
            <div class="info-section">
                <h2>Get In Touch</h2>

                <div class="contact-item whatsapp">
                    <div class="contact-icon">
                        <i class="fab fa-whatsapp"></i>
                    </div>
                    <div class="contact-text">
                        <h3>WhatsApp</h3>
                        <p>Chat with us on WhatsApp</p>
                    </div>
                </div>

                <div class="contact-item email">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-text">
                        <h3>Email</h3>
                        <p>csa@mmcdasc.edu.np</p>
                    </div>
                </div>

                <div class="contact-item location">
                    <div class="contact-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="contact-text">
                        <h3>Location</h3>
                        <p>Tulsipur, Dang, Nepal</p>
                    </div>
                </div>

                <div class="social-section">
                    <h3>Follow Us</h3>
                    <div class="social-icons">
                        <a href="#" class="social-icon facebook">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="social-icon instagram">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="#" class="social-icon linkedin">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                        <a href="#" class="social-icon twitter">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a href="#" class="social-icon youtube">
                            <i class="fab fa-youtube"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Map Section -->
        <div class="map-section">
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3532.089159843373!2d82.28173!3d28.7612!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39940a4e4e4e4e4d%3A0x4e4e4e4e4e4e4e4e!2sTulsipur%2C%20Dang%2C%20Nepal!5e0!3m2!1sen!2snp!4v1686567890123" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
